---
# PwnStack — randomly displays a Palnagotchi mood face on an ESPHome-driven
# display, then hands the display back to your normal UI.
#
# Faces come from viniciusbo/m5-palnagotchi (mood.cpp → palnagotchi_default_moods).
# Include via packages: in your device YAML. See README.md for setup.

substitutions:
  # ID of the existing display this package should draw onto.
  pwn_display_id: m5cores3_lcd

  # ID of the script in your base config that re-draws the normal UI.
  # Called after the face has been shown so the display returns to its
  # idle/voice-assistant page.
  pwn_redraw_script: draw_display

  # A condition lambda that must evaluate to true for a face to appear.
  # Default: only show faces when the StackChan voice assistant is idle.
  # Override with e.g. "true" to always allow faces.
  pwn_show_condition: 'id(voice_assistant_phase) == 1'

  # Random delay window between face appearances (milliseconds).
  # Effective delay = pwn_min_delay_ms + rand(0..pwn_random_spread_ms)
  pwn_min_delay_ms: "30000"      # 30s minimum
  pwn_random_spread_ms: "270000" # + up to 4m30s → range 30s..5m

  # How long a face stays on screen (milliseconds).
  pwn_visible_min_ms: "2000"     # 2s minimum
  pwn_visible_spread_ms: "5000"  # + up to 5s → range 2s..7s

  # Visual styling.
  pwn_font_family: Figtree
  pwn_font_size: "64"
  pwn_text_color_r: "0"
  pwn_text_color_g: "255"
  pwn_text_color_b: "0"

globals:
  - id: pwn_face
    type: std::string
    restore_value: no
    initial_value: '"(O__O)"'

font:
  # Palnagotchi faces are pure ASCII, so the default Latin Core glyphset
  # is enough — no need for symbol/math/mono Noto fallbacks.
  - file:
      type: gfonts
      family: ${pwn_font_family}
      weight: 400
    id: pwn_font
    size: ${pwn_font_size}
    glyphsets:
      - GF_Latin_Core

display:
  - id: !extend ${pwn_display_id}
    pages:
      - id: pwn_face_page
        lambda: |-
          it.fill(Color::BLACK);
          it.printf(it.get_width() / 2, it.get_height() / 2,
                    id(pwn_font),
                    Color(${pwn_text_color_r}, ${pwn_text_color_g}, ${pwn_text_color_b}),
                    TextAlign::CENTER,
                    "%s", id(pwn_face).c_str());

esphome:
  on_boot:
    - priority: -100
      then:
        - script.execute: pwn_face_loop

script:
  - id: pwn_face_loop
    mode: restart
    then:
      - delay: !lambda 'return ${pwn_min_delay_ms} + (random_uint32() % ${pwn_random_spread_ms});'
      - if:
          condition:
            lambda: 'return ${pwn_show_condition};'
          then:
            - lambda: |-
                // Palnagotchi default mood set (see viniciusbo/m5-palnagotchi
                // mood.cpp → palnagotchi_default_moods[]). Pure ASCII so
                // every glyph is in the Latin Core set.
                static const char* faces[] = {
                  "(v__v)",   // 0  sleeping
                  "(=__=)",   // 1  awakening
                  "(O__O)",   // 2  awake
                  "( O_O)",   // 3  observing right
                  "(O_O )",   // 4  observing left
                  "( 0_0)",   // 5  observing happy right
                  "(0_0 )",   // 6  observing happy left
                  "(+__+)",   // 7  intense
                  "(-@_@)",   // 8  cool
                  "(0__0)",   // 9  happy
                  "(^__^)",   // 10 grateful
                  "(a__a)",   // 11 excited
                  "(+__+)",   // 12 smart
                  "(*__*)",   // 13 friendly
                  "(@__@)",   // 14 motivated
                  "(>__<)",   // 15 demotivated
                  "(-__-)",   // 16 bored
                  "(T_T )",   // 17 sad
                  "(;__;)",   // 18 lonely
                  "(X__X)",   // 19 broken
                  "(#__#)",   // 20 debugging
                  "8====D"    // 21 ultra random easter egg
                };
                id(pwn_face) = faces[random_uint32() % (sizeof(faces) / sizeof(*faces))];
            - display.page.show: pwn_face_page
            - component.update: ${pwn_display_id}
            - delay: !lambda 'return ${pwn_visible_min_ms} + (random_uint32() % ${pwn_visible_spread_ms});'
            - script.execute: ${pwn_redraw_script}
      - script.execute: pwn_face_loop

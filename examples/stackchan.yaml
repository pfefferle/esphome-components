---
# Example: bolt PwnStack onto an M5Stack StackChan voice assistant.
#
# This config pulls in the upstream StackChan base from m5stack/esphome-yaml
# and then layers PwnStack on top so that, while the assistant is idle, a
# random Pwnagotchi face appears on the LCD every so often before the normal
# StackChan idle image returns.

substitutions:
  name: stackchan-pwn
  friendly_name: StackChan PwnStack

packages:
  stackchan:
    url: https://github.com/m5stack/esphome-yaml
    file: common/stackchan-voice-assistant-base.yaml
    refresh: 1d
  pwnagotchi:
    url: https://github.com/pfefferle/esphome-components
    file: components/pwnstack/pwnagotchi-face.yaml
    refresh: 1d

# Optional: tweak how often / how long faces appear. All substitutions
# defined in pwnagotchi-face.yaml can be overridden here.
#
# substitutions:
#   pwn_min_delay_ms: "60000"        # at least 1 minute between faces
#   pwn_random_spread_ms: "540000"   # up to 10 minutes
#   pwn_visible_min_ms: "3000"       # show each face for at least 3s
#   pwn_visible_spread_ms: "4000"    # up to 7s

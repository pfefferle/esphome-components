# Starter config for an M5Stack Core (ESP32 + ILI9341 320x240).
# CoreS3 / Core2 / other boards: swap the board, SPI pins, and display
# platform; the avatar code itself is panel-agnostic.
#
# The avatar is pulled from GitHub via the `packages` block below — no
# local copy of esphome_avatar.h is required: package.yaml wires up the
# `esphome_avatar` external component, which ESPHome fetches from this
# repo and compiles into the build.

packages:
  avatar:
    url: https://github.com/pfefferle/esphome-avatar
    files: [package.yaml]
    ref: main
    refresh: 1d

esphome:
  name: esphome-avatar
  friendly_name: ESPHome Avatar

esp32:
  board: m5stack-core-esp32
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# --- display ---------------------------------------------------------------

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

display:
  - platform: ili9xxx
    model: M5STACK
    cs_pin: GPIO14
    dc_pin: GPIO27
    reset_pin: GPIO33
    rotation: 0
    invert_colors: true         # required by ili9xxx; correct for M5Stack Core
    update_interval: 33ms       # ~30 fps
    lambda: |-
      static stackchan_avatar::Avatar avatar;
      auto opt = id(avatar_expression).state;
      using E = stackchan_avatar::Expression;
      if      (opt == "happy")  avatar.set_expression(E::Happy);
      else if (opt == "sad")    avatar.set_expression(E::Sad);
      else if (opt == "angry")  avatar.set_expression(E::Angry);
      else if (opt == "sleepy") avatar.set_expression(E::Sleepy);
      else if (opt == "doubt")  avatar.set_expression(E::Doubt);
      else                      avatar.set_expression(E::Neutral);
      avatar.set_speaking(id(speaking_global));
      avatar.set_listening(id(listening_global));
      // While idle mode is on, the avatar wanders moods on its own and
      // overrides the expression select above each frame.
      avatar.set_idle(id(idle_global));
      auto fx = id(avatar_effect).state;
      using FX = stackchan_avatar::Effect;
      if      (fx == "none")    avatar.set_effect(FX::None);
      else if (fx == "music")   avatar.set_effect(FX::Music);
      else if (fx == "zzz")     avatar.set_effect(FX::Zzz);
      else if (fx == "heart")   avatar.set_effect(FX::Heart);
      else if (fx == "anger")   avatar.set_effect(FX::Anger);
      else if (fx == "sweat")   avatar.set_effect(FX::Sweat);
      else if (fx == "chill")   avatar.set_effect(FX::Chill);
      else if (fx == "bubbles") avatar.set_effect(FX::Bubbles);
      else                      avatar.set_effect(FX::Auto);
      avatar.update_animations(millis());
      avatar.draw(it);

# --- HA-controlled state ---------------------------------------------------
# Optional: expose expression + speaking state via Home Assistant.
# The display lambda above already drives blink/breath/speech animation;
# these just let HA flip the mood and toggle "talking".

select:
  - platform: template
    name: "Avatar Expression"
    id: avatar_expression
    optimistic: true
    options:
      - neutral
      - happy
      - sad
      - angry
      - sleepy
      - doubt
    initial_option: neutral

  # Top-right effect mark. "auto" follows the expression like the
  # original (happy -> heart, angry -> anger mark, sad -> chill lines,
  # doubt -> sweat drop, sleepy -> ZZz). The rest force a specific mark.
  - platform: template
    name: "Avatar Effect"
    id: avatar_effect
    optimistic: true
    options:
      - auto
      - none
      - music
      - zzz
      - heart
      - anger
      - sweat
      - chill
      - bubbles
    initial_option: auto

switch:
  - platform: template
    name: "Avatar Speaking"
    id: avatar_speaking
    optimistic: true
    # hooked into the display lambda via a global flag below
    turn_on_action:
      - lambda: |-
          id(speaking_global) = true;
    turn_off_action:
      - lambda: |-
          id(speaking_global) = false;

  # Idle mode (on by default): the avatar entertains itself — wanders
  # between calm moods, dozes off after 5 min of inactivity (Sleepy face,
  # ZZz, slow breathing), naps for 2 min, and wakes up on its own or as
  # soon as it speaks/listens. Turn off for manual expression control.
  - platform: template
    name: "Avatar Idle"
    id: avatar_idle
    optimistic: true
    restore_mode: ALWAYS_ON
    turn_on_action:
      - lambda: |-
          id(idle_global) = true;
    turn_off_action:
      - lambda: |-
          id(idle_global) = false;

  # Listening keeps the mouth closed — the avatar perks up instead:
  # wide attentive eyes, steady slightly-raised gaze, saccades paused.
  - platform: template
    name: "Avatar Listening"
    id: avatar_listening
    optimistic: true
    turn_on_action:
      - lambda: |-
          id(listening_global) = true;
    turn_off_action:
      - lambda: |-
          id(listening_global) = false;

globals:
  - id: speaking_global
    type: bool
    restore_value: no
    initial_value: "false"
  - id: listening_global
    type: bool
    restore_value: no
    initial_value: "false"
  - id: idle_global
    type: bool
    restore_value: no
    initial_value: "true"

# --- media-player binding --------------------------------------------------
# Subscribes to a Home Assistant media_player entity. While it's actively
# playing, the avatar mouths along AND music notes drift through the
# top-right corner; both revert when playback stops. Last writer wins
# between this and the manual switches/select above.
#
# Replace `media_player.living_room` with your actual entity_id, or remove
# this block if you don't have a media_player to bind.

text_sensor:
  - platform: homeassistant
    id: media_player_state
    entity_id: media_player.living_room   # TODO: set to your media_player
    on_value:
      then:
        - lambda: |-
            id(speaking_global) = (x == "playing");
        - select.set:
            id: avatar_effect
            option: !lambda 'return x == "playing" ? "music" : "auto";'
